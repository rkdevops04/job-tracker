name: Daily ingestion

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pyyaml pytest responses

      - name: Run tests
        run: PYTHONPATH=. pytest

      - name: Run ingestion
        env:
          ADZUNA_APP_ID:  ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
        run: PYTHONPATH=. python -m src.ingest

      - name: Generate digest
        run: PYTHONPATH=. python -m src.digest

      - name: Upload DB artifact
        uses: actions/upload-artifact@v5
        with:
          name: jobs-db-${{ github.run_id }}
          path: jobs.db
          retention-days: 90

      - name: Upload digest artifact
        uses: actions/upload-artifact@v5
        with:
          name: digest-${{ github.run_id }}
          path: output/
          retention-days: 90

      - name: Commit updated DB and digest to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.db output/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: daily ingest $(date -u +%Y-%m-%d)"
          git push origin HEAD:${{ github.ref_name }}
