# Companies to track. Add one entry per company.
#
# ats_type: greenhouse | lever | ashby | jsearch
#
# For jsearch:
#   ats_slug  = free-text search query sent to JSearch/RapidAPI
#   pages     = number of result pages to fetch (10 results per page, default 1)
#   Requires JSEARCH_API_KEY in your .env file.

companies:
  # --- JSearch (LinkedIn / Indeed / Google Jobs) ---
  - name: "Google SRE"
    ats_type: jsearch
    ats_slug: "Site Reliability Engineer at Google"
    pages: 2

